<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- 圆形底 -->
  <circle cx="32" cy="32" r="28" fill="#e6f4ff" stroke="#1677ff" stroke-width="1.5"/>
  <!-- 无人机机身 -->
  <rect x="26" y="28" width="12" height="8" rx="3" fill="#1677ff"/>
  <!-- 四个机臂 -->
  <line x1="26" y1="30" x2="14" y2="20" stroke="#1677ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="30" x2="50" y2="20" stroke="#1677ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="26" y1="34" x2="14" y2="44" stroke="#1677ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="34" x2="50" y2="44" stroke="#1677ff" stroke-width="2" stroke-linecap="round"/>
  <!-- 四个螺旋桨 -->
  <circle cx="14" cy="20" r="5" fill="none" stroke="#4096ff" stroke-width="1.5" stroke-dasharray="4 2"/>
  <circle cx="50" cy="20" r="5" fill="none" stroke="#4096ff" stroke-width="1.5" stroke-dasharray="4 2"/>
  <circle cx="14" cy="44" r="5" fill="none" stroke="#4096ff" stroke-width="1.5" stroke-dasharray="4 2"/>
  <circle cx="50" cy="44" r="5" fill="none" stroke="#4096ff" stroke-width="1.5" stroke-dasharray="4 2"/>
  <!-- 连接线 -->
  <circle cx="32" cy="32" r="2" fill="#ff8913"/>
</svg>
