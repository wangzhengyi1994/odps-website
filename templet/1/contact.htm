<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <#include "head.htm"/>
</head>
<body>

<#include "header.htm"/>

<!-- Banner -->
<section class="page-banner" style="background-image:url('{ms:global.style/}/images/banners/contact.jpg')">
  <div class="container">
    <h1>联系我们</h1>
    <p>期待与您携手，共创安全智能未来</p>
  </div>
</section>

<!-- Contact Section -->
<section class="section">
  <div class="container">
    <div class="contact-wrap">
      <!-- Left: Form -->
      <div class="contact-form">
        <div class="form-group">
          <label>姓名</label>
          <input type="text" placeholder="请输入您的姓名">
        </div>
        <div class="form-group">
          <label>电话</label>
          <input type="tel" placeholder="请输入您的联系电话">
        </div>
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" placeholder="请输入您的邮箱地址">
        </div>
        <div class="form-group">
          <label>公司名称</label>
          <input type="text" placeholder="请输入您的公司名称">
        </div>
        <div class="form-group">
          <label>需求描述</label>
          <textarea placeholder="请描述您的需求或问题"></textarea>
        </div>
        <button class="btn btn-blue">提交咨询</button>
      </div>
      <!-- Right: Info from CMS -->
      <div class="contact-sidebar">
        {ms:arclist typeid="80" size="4" orderby="sort"}
        <div class="contact-info-card">
          <h4>${field.title}</h4>
          <ul>
            <li>${field.content}</li>
          </ul>
        </div>
        {/ms:arclist}
      </div>
    </div>
  </div>
</section>

<!-- Map Section -->
<section class="section section-light">
  <div class="container">
    <div style="background:#e8e8e8;border-radius:12px;height:400px;display:flex;align-items:center;justify-content:center;color:#999;font-size:16px;">
      地图加载区域
    </div>
  </div>
</section>

<#include "footer.htm"/>

<script src="{ms:global.style/}/js/main.js"></script>
</body>
</html>
